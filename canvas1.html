<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>


    #bar{
      width:100%;
      text-align:center;
      padding:20px;
      position:fixed;
      
    }
    
    #erase,#draw,#size,#small,#clear,#change
    {
      background:black;
      cursor:pointer;
      text-align: center;
      color: gold;
      border-radius: 20px;
      box-shadow: 2px 5px 5px black;
    }


    #mycan
    {
    
     position:relative;
     top:50px;
    }

   #info
   {
    width:100%;
    box-shadow:10px 10px 1px gray;
    position:fixed;
    z-index:24;
   }
   

</style>

<body>
    
  <div id="bar"><button id="erase">Erase</button><button id="draw">Draw ON/OFF</button>
    <button id="size">Size</button><button id="small">Resize</button><input color="change"></input>

</body>


<body>

  <div id="info">Keys: - e = erase , g = drawmode on/off, spcabar: = clear , screen, c = color , s = brushsize + , d =brushsize --</div>

    <canvas id="mycan" width="1600" height="800"></canvas>
    <!--we have to use  drawing api drawing function-->

    <script>
      var can = document.getElementById("mycan")
      var drawmode = false
      var c = can.getContext("2d");
      var drawcolor ="red"
      var brushsize ="2"
      var r,g,b

      var d =document.getElementById("erase")
      var l =document.getElementById("draw")
      var q =document.getElementById("size")
      var w =document.getElementById("small")
      var e =document.getElementById("change")
      var size =document.getElementById("size")
      var small =document.getElementById("small")
      

      
      function startdraw(e)
      {
        document.title ="X ="+e.pagX+" y ="+e.pageY
        if(drawmode)
        {       document.title ="drawing"
           c.beginPath()
          c.arc(e.pageX-10,e.pageY-60,brushsize,0,2*Math.PI)
          c.fillStyle = drawcolor
          c.fill()
          }
      }

      function f1(e)
    {


       // document.title=e.keyCode



       // e = for erase
       if(e.keyCode == 69)
           {
             drawcolor="white"
           }

          
          

// g = drawmode on/off
if(e.keyCode == 71)
        {
               if(drawmode)
                  {
                    drawmode = false
                  }

                  else
                  {
                    drawmode = true
                  }
          document.title = drawmode
        }


        //s
        if(e.keyCode == 83)
       {
         brushsize++           
         document.title=brushsize
       }

        
        //68=D
        if(e.keyCode == 68)
       {
          brushsize--
          document.title =brushsize
       }

        //spacebar
        if(e.keyCode==32)
       {
        c.clearRect(0,0,1500,900)
       }

        //67=c
        if(e.keyCode == 67)
       {
         r= Math.round(Math.random()*255)
         g= Math.round(Math.random()*255)
         b= Math.round(Math.random()*255)

         drawcolor=`rgb(${r},${g},${b})`
       }


    }
        size.onclick= function()
            {
                 brushsize++           
         document.title=brushsize
            }

         small.onclick= function()
            {
                 brushsize--
          document.title =brushsize
                
            }
        

      document.addEventListener("mousemove",startdraw)
      document.addEventListener("keydown",f1)


    </script>
    
</body>
</html>
